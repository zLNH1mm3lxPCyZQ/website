<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <style>
        :root {
            --bg: #fafaf7;
            --surface: #ffffff;
            --border: #e5e3dc;
            --border-strong: #c9c6bc;
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #2563eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--text);
        }

        .post-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .post-title {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: var(--text);
        }

        .post-date {
            font-size: 0.9rem;
            color: var(--muted);
            margin: 0;
        }

        .post-tags {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tag {
            background: var(--bg);
            padding: 0.25rem 0.65rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .post-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            line-height: 1.7;
        }

        .post-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .post-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .post-content p {
            margin: 0.75rem 0;
        }

        .post-content ul {
            margin: 0.75rem 0;
            padding-left: 2rem;
        }

        .post-content li {
            margin: 0.35rem 0;
        }

        .post-content blockquote {
            border-left: 3px solid var(--border-strong);
            color: var(--muted);
            padding-left: 1rem;
            margin-left: 1rem;
            margin: 1rem 0 1rem 1rem;
        }

        .post-content code {
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            font-size: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
        }

        .post-content pre {
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            font-size: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .post-content pre code {
            background: transparent;
            border: none;
            padding: 0;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 6px;
            display: block;
            margin: 1.5rem auto;
        }

        .post-content hr {
            border: none;
            border-top: 1px solid var(--border-strong);
            margin: 1.5rem 0;
        }

        .post-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        /* image titles (italic text after images) */
        .post-content img+em {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 500;
            margin-top: 0.6rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link">← back to home</a>

        <div class="post-header">
            <h1 class="post-title">{{ page.title }}</h1>
            <p class="post-date">{{ page.date | date: "%B %d, %Y at %H:%M" }}</p>
            {% if page.tags %}
            <div class="post-tags">
                {% for tag in page.tags %}
                <span class="tag">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>

        <div class="post-content">
            {{ content }}
        </div>
    </div>
</body>

</html>
